# See https://fly.io/docs/app-guides/continuous-deployment-with-github-actions/

name: Fly Deploy
on:
  push:
    branches:
      - master
      - develop

jobs:
  deploy-master:
    if: github.ref == 'refs/heads/master'
    name: Deploy app (master)
    runs-on: ubuntu-latest
    concurrency: deploy-master-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_API_TOKEN }}

  deploy-develop:
    if: github.ref == 'refs/heads/develop'
    name: Deploy app (develop)
    runs-on: ubuntu-latest
    concurrency: deploy-develop-group
    steps:
      - uses: actions/checkout@v4
      - uses: superfly/flyctl-actions/setup-flyctl@master
      - run: flyctl deploy --config ./fly.development.toml --remote-only
        env:
          FLY_API_TOKEN: ${{ secrets.FLY_DEV_API_TOKEN}}
