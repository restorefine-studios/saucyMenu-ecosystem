services:
  - type: web
    name: saucy-menu-backend
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /healthz
    envVars:
      - key: PORT
        value: 8080
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: DIRECT_URL
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: BETTER_AUTH_SECRET
        sync: false
      - key: BETTER_AUTH_URL
        sync: false
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: INTERNAL_ADMIN_TOKEN
        sync: false
      - key: WEBAUTHN_RPID
        sync: false
      - key: WEBAUTHN_ORIGIN
        sync: false
      - key: UPLOAD_SERVICE_URL
        sync: false
      - key: MEDIA_SERVICE_URL
        sync: false
