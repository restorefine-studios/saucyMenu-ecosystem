# fly.toml app configuration file generated for saucy-menu-backend on 2026-06-19T01:31:13+05:45
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'saucy-menu-backend'
primary_region = 'fra'

[build]

[env]
  NODE_ENV = 'production'
  PORT = '8080'

[processes]
  app = './server'

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = 'off'
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

  [[http_service.checks]]
    interval = '15s'
    timeout = '5s'
    grace_period = '10s'
    method = 'GET'
    path = '/healthz'

[[vm]]
  size = 'shared-cpu-1x'
  memory = '512mb'
  processes = ['app']
